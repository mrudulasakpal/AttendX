<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX - High-Tech Attendance</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <div class="logo-container">
                <!-- Expecting user to place VIT logo here, placeholder text for now -->
                <img src="/logo.png" alt="VIT Logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/80x80/0a0e17/00e5ff?text=VIT';">
            </div>
            <h1>AttendX</h1>
            <p class="subtitle">Next-Generation Attendance System</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchMode('login')">Login</div>
            <div class="tab" id="tab-signup" onclick="switchMode('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div class="form-container active" id="form-login">
            <div class="form-group">
                <label for="login-role">Select Role</label>
                <select id="login-role" style="width: 100%; padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; outline: none; margin-bottom: 1rem;">
                    <option value="student" style="color: black;">Student</option>
                    <option value="teacher" style="color: black;">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <label id="login-username-label" for="login-username">Roll Number</label>
                <input type="text" id="login-username" placeholder="Enter your credentials" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            <button class="btn" onclick="handleLogin()">Access Portal</button>
            <div id="login-status" class="status-message"></div>
        </div>

        <!-- Signup Form -->
        <div class="form-container" id="form-signup">
            <div class="form-group">
                <label for="signup-role">Select Role</label>
                <select id="signup-role" style="width: 100%; padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; outline: none; margin-bottom: 1rem;">
                    <option value="student" style="color: black;">Student</option>
                    <option value="teacher" style="color: black;">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <label id="signup-username-label" for="signup-username">Roll Number</label>
                <input type="text" id="signup-username" placeholder="Enter your credentials" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Create Password</label>
                <input type="password" id="signup-password" placeholder="Create a secure password" required>
            </div>
            <button class="btn" onclick="handleSignup()">Create Account</button>
            <div id="signup-status" class="status-message"></div>
        </div>
    </div>

    <script>
        function switchMode(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById(`form-${mode}`).classList.add('active');
        }

        // Update labels based on role selection
        document.getElementById('login-role').addEventListener('change', function(e) {
            document.getElementById('login-username-label').innerText = e.target.value === 'student' ? 'Roll Number' : 'Username';
        });

        document.getElementById('signup-role').addEventListener('change', function(e) {
            document.getElementById('signup-username-label').innerText = e.target.value === 'student' ? 'Roll Number' : 'Username';
        });

        async function handleSignup() {
            const role = document.getElementById('signup-role').value;
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;
            const statusDiv = document.getElementById('signup-status');

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, role})
                });
                
                const data = await response.json();
                statusDiv.style.display = 'block';
                
                if (response.ok) {
                    statusDiv.className = 'status-message status-success';
                    statusDiv.innerText = 'Account created successfully! Please login.';
                    setTimeout(() => switchMode('login'), 2000);
                } else {
                    statusDiv.className = 'status-message status-error';
                    statusDiv.innerText = data.detail || 'Signup failed';
                }
            } catch (err) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'status-message status-error';
                statusDiv.innerText = 'Server connection error';
            }
        }

        async function handleLogin() {
            const role = document.getElementById('login-role').value;
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const statusDiv = document.getElementById('login-status');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, role})
                });
                
                const data = await response.json();
                statusDiv.style.display = 'block';
                
                if (response.ok) {
                    statusDiv.className = 'status-message status-success';
                    statusDiv.innerText = 'Login successful! Redirecting...';
                    
                    // Store user info in localStorage
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', role);
                    
                    setTimeout(() => {
                        window.location.href = role === 'student' ? '/student' : '/faculty';
                    }, 1000);
                } else {
                    statusDiv.className = 'status-message status-error';
                    statusDiv.innerText = data.detail || 'Login failed';
                }
            } catch (err) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'status-message status-error';
                statusDiv.innerText = 'Server connection error';
            }
        }
    </script>
</body>
</html>
